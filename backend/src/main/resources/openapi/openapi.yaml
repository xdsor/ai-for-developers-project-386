openapi: 3.1.0
info:
  title: Meeting Booking Service
  version: 0.0.0
tags:
  - name: Guest Hosts
  - name: Guest Bookings
  - name: Host Account
  - name: Host Events
  - name: Host Bookings
paths:
  /host/{hostId}:
    get:
      operationId: HostAccount_read
      description: Read a host by id.
      parameters:
        - name: hostId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Host'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Host Account
  /host/{hostId}/bookings:
    get:
      operationId: HostBookings_list
      description: List bookings for a host across all owned events.
      parameters:
        - name: hostId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingList'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Host Bookings
  /host/{hostId}/events:
    get:
      operationId: HostEvents_list
      description: List events owned by a host.
      parameters:
        - name: hostId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventList'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Host Events
    post:
      operationId: HostEvents_create
      description: Create an event owned by a host.
      parameters:
        - name: hostId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Host Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
  /host/{hostId}/events/{eventId}:
    get:
      operationId: HostEvents_read
      description: Read an event owned by a host.
      parameters:
        - name: hostId
          in: path
          required: true
          schema:
            type: string
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Host Events
    patch:
      operationId: HostEvents_update
      description: Update an event owned by a host.
      parameters:
        - name: hostId
          in: path
          required: true
          schema:
            type: string
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Host Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventRequest'
    delete:
      operationId: HostEvents_delete
      description: Delete an event owned by a host.
      parameters:
        - name: hostId
          in: path
          required: true
          schema:
            type: string
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Host Events
  /hosts/{hostSlug}:
    get:
      operationId: GuestHosts_readProfile
      description: Get a public host profile and all events created by that host.
      parameters:
        - name: hostSlug
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/NonEmptyString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostProfile'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Guest Hosts
  /hosts/{hostSlug}/events:
    get:
      operationId: GuestHosts_listEvents
      description: List public events created by a host.
      parameters:
        - name: hostSlug
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/NonEmptyString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventList'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Guest Hosts
  /hosts/{hostSlug}/events/{eventSlug}:
    get:
      operationId: GuestHosts_readEvent
      description: Get a public event by host slug and event slug.
      parameters:
        - name: hostSlug
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/NonEmptyString'
        - name: eventSlug
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/NonEmptyString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Guest Hosts
  /hosts/{hostSlug}/events/{eventSlug}/booking-page:
    get:
      operationId: GuestBookings_readBookingPage
      description: Get all data needed to render the public booking page for an event.
      parameters:
        - name: hostSlug
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/NonEmptyString'
        - name: eventSlug
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/NonEmptyString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventBookingPage'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Guest Bookings
  /hosts/{hostSlug}/events/{eventSlug}/bookings:
    post:
      operationId: GuestBookings_createBooking
      description: Create a booking for a free slot in the event host's 14-day booking window.
      parameters:
        - name: hostSlug
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/NonEmptyString'
        - name: eventSlug
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/NonEmptyString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Guest Bookings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
  /hosts/{hostSlug}/events/{eventSlug}/slots:
    get:
      operationId: GuestBookings_listSlots
      description: List free slots for the next 14 days from the host's current date.
      parameters:
        - name: hostSlug
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/NonEmptyString'
        - name: eventSlug
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/NonEmptyString'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeSlotList'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      tags:
        - Guest Bookings
components:
  schemas:
    Booking:
      type: object
      required:
        - id
        - eventId
        - ownerId
        - guest
        - startAt
        - endAt
        - createdAt
      properties:
        id:
          type: string
        eventId:
          type: string
        ownerId:
          type: string
        guest:
          $ref: '#/components/schemas/GuestContact'
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      description: Meeting reservation created by a guest for an event.
    BookingList:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Booking'
    CreateBookingRequest:
      type: object
      required:
        - guest
        - startAt
      properties:
        guest:
          $ref: '#/components/schemas/GuestContact'
        startAt:
          type: string
          format: date-time
    CreateEventRequest:
      type: object
      required:
        - title
        - description
        - durationMinutes
        - slug
      properties:
        title:
          $ref: '#/components/schemas/NonEmptyString'
        description:
          type: string
        durationMinutes:
          $ref: '#/components/schemas/PositiveDurationMinutes'
        slug:
          $ref: '#/components/schemas/NonEmptyString'
    Email:
      type: string
      format: email
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
    ErrorCode:
      type: string
      enum:
        - NotFound
        - ValidationFailed
        - SlotOutsideBookingWindow
        - SlotUnavailable
        - SlotDurationMismatch
        - SlugAlreadyExists
    Event:
      type: object
      required:
        - id
        - ownerId
        - title
        - description
        - durationMinutes
        - slug
      properties:
        id:
          type: string
        ownerId:
          type: string
        title:
          $ref: '#/components/schemas/NonEmptyString'
        description:
          type: string
        durationMinutes:
          $ref: '#/components/schemas/PositiveDurationMinutes'
        slug:
          $ref: '#/components/schemas/NonEmptyString'
      description: Meeting topic created by a host and shared through a public link.
    EventBookingPage:
      type: object
      required:
        - host
        - event
        - slots
      properties:
        host:
          $ref: '#/components/schemas/Host'
        event:
          $ref: '#/components/schemas/Event'
        slots:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'
    EventList:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Event'
    GuestContact:
      type: object
      required:
        - name
        - email
      properties:
        name:
          $ref: '#/components/schemas/NonEmptyString'
        email:
          $ref: '#/components/schemas/Email'
      description: Guest contact details captured directly on the booking in the MVP.
    Host:
      type: object
      required:
        - id
        - name
        - slug
        - timeZone
      properties:
        id:
          type: string
        name:
          $ref: '#/components/schemas/NonEmptyString'
        slug:
          $ref: '#/components/schemas/NonEmptyString'
        timeZone:
          $ref: '#/components/schemas/NonEmptyString'
      description: Host who owns events and receives bookings.
    HostProfile:
      type: object
      required:
        - host
        - events
      properties:
        host:
          $ref: '#/components/schemas/Host'
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
    NonEmptyString:
      type: string
      minLength: 1
    PositiveDurationMinutes:
      type: integer
      format: int32
      minimum: 1
      maximum: 1440
    TimeSlot:
      type: object
      required:
        - startAt
        - endAt
      properties:
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
      description: Computed available slot for an event in the owner's next 14-day booking window.
    TimeSlotList:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'
    UpdateEventRequest:
      type: object
      properties:
        title:
          $ref: '#/components/schemas/NonEmptyString'
        description:
          type: string
        durationMinutes:
          $ref: '#/components/schemas/PositiveDurationMinutes'
        slug:
          $ref: '#/components/schemas/NonEmptyString'
